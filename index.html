    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kevin GPS " />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://server.arcgisonline.com https://basemaps.cartocdn.com https://*.basemaps.cartocdn.com; connect-src 'self' https://*.traccar.org https://demo3.polarisfleet.com https://nominatim.openstreetmap.org https://tiles.openfreemap.org https://server.arcgisonline.com https://basemaps.cartocdn.com https://*.basemaps.cartocdn.com wss://*.traccar.org wss://traccar3-proxy.ship9i.workers.dev; worker-src 'self' blob:; manifest-src 'self'" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://tiles.openfreemap.org" />
    <link rel="preconnect" href="https://nominatim.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://tiles.openfreemap.org" />
    <link rel="dns-prefetch" href="https://server.arcgisonline.com" />

    <title>Kevin GPS </title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // Check for updates on every page load
            reg.addEventListener('updatefound', () => {
              const installing = reg.installing;
              if (installing) {
                installing.addEventListener('statechange', () => {
                  if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                    // New version available — reload to activate
                    if (confirm('新版本可用，是否重新載入？')) {
                      window.location.reload();
                    }
                  }
                });
              }
            });
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
